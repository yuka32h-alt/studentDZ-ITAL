<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VFS Student Visa Document Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Supabase Configuration
        const SUPABASE_URL = 'https://zkaffxvincheclkmtfgz.supabase.co'; 
        const SUPABASE_ANON_KEY = 'sb_publishable_bWGg5-BvOet3eocjqdPFVg_gwOvUHaP';
        
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let currentStudent = "";
        
        const checklistItems = [
            { id: "universitaly", category: "Mandatory", name: "Universitaly Summary", desc: "The PDF summary downloaded after pre-enrollment validation." },
            { id: "degree_legalized", category: "Academic", name: "Legalized Degree/Diploma", desc: "Original certificates legalized or apostilled by your Ministry of Foreign Affairs." },
            { id: "transcripts", category: "Academic", name: "Final Transcripts", desc: "Official academic records, translated into Italian if required." },
            { id: "dov_cimea", category: "Academic", name: "DoV or CIMEA", desc: "Declaration of Value or Statement of Comparability." },
            { id: "admission_letter", category: "Academic", name: "Admission Letter", desc: "Official acceptance from your Italian University." },
            { id: "language_cert", category: "Academic", name: "Language Proficiency", desc: "IELTS/TOEFL (English) or CILS/CELI (Italian) certificate." },
            { id: "passport", category: "Personal", name: "Passport & Copies", desc: "Valid for 3+ months after visa expiry. Copy of identity pages." },
            { id: "visa_form", category: "Forms", name: "Visa Application Form", desc: "D-Type (National Visa) form, filled and signed." },
            { id: "photos", category: "Personal", name: "Passport Photos", desc: "Two recent photos (35x45mm) on a white background." },
            { id: "accommodation", category: "Logistics", name: "Proof of Stay", desc: "Lease, hotel booking (15+ days), or Declaration of Hospitality." },
            { id: "financials", category: "Financial", name: "Proof of Means", desc: "Bank statements showing ~€6,100/year or Scholarship letter." },
            { id: "insurance", category: "Health", name: "Schengen Insurance", desc: "Health coverage of €30,000 for emergency medical/repatriation." },
            { id: "flight", category: "Logistics", name: "Flight Reservation", desc: "Round-trip flight booking or a confirmed itinerary." }
        ];

        async function loadStudentProfile() {
            const nameInput = document.getElementById('student-name-input').value.trim();
            if (!nameInput) {
                alert("Please enter your name to view your checklist.");
                return;
            }
            
            currentStudent = nameInput.toLowerCase();
            document.getElementById('current-user-display').innerText = `Student: ${nameInput}`;
            document.getElementById('sync-status').innerText = "Loading data...";
            
            document.getElementById('auth-panel').classList.add('hidden');
            document.getElementById('checklist-workspace').classList.remove('hidden');

            // Query database for this single wide row entry
            let { data, error } = await _supabase
                .from('student_progress')
                .select('*')
                .eq('student_name', currentStudent)
                .maybeSingle();

            const progressMap = {};
            
            if (data) {
                // If a student row exists, map column headers to their values
                checklistItems.forEach(item => {
                    progressMap[item.id] = data[item.id] || "missing";
                });
                document.getElementById('sync-status').innerText = "Data Loaded Successfully";
                if (data.updated_at) {
                    document.getElementById('last-update-time').innerText = `Last sync: ${new Date(data.updated_at).toLocaleString()}`;
                }
            } else {
                // If a brand new user logged in, create their initial base row entry
                const initialPayload = { student_name: currentStudent };
                checklistItems.forEach(item => initialPayload[item.id] = 'missing');
                
                const { error: insertError } = await _supabase
                    .from('student_progress')
                    .insert([initialPayload]);
                
                checklistItems.forEach(item => progressMap[item.id] = "missing");
                document.getElementById('sync-status').innerText = "New Portfolio Created";
            }

            renderChecklistUI(progressMap);
        }

        function renderChecklistUI(progressMap) {
            const container = document.getElementById('rows-container');
            container.innerHTML = "";
            
            checklistItems.forEach(item => {
                const savedStatus = progressMap[item.id] || "missing";

                let cardColor = "bg-white border-slate-200";
                
                if(savedStatus === 'ready') {
                    cardColor = "bg-emerald-50/40 border-emerald-200";
                } else if(savedStatus === 'in_progress') {
                    cardColor = "bg-amber-50/40 border-amber-200";
                }

                const card = document.createElement('div');
                card.id = `card-${item.id}`;
                card.className = `p-5 flex flex-col sm:flex-row sm:items-center justify-between gap-4 border rounded-xl transition shadow-xs ${cardColor}`;
                
                const isReady = savedStatus === 'ready';
                const isInProgress = savedStatus === 'in_progress';

                card.innerHTML = `
                    <div class="flex items-start gap-4 grow">
                        <input type="checkbox" ${isReady ? 'checked' : ''} 
                            onchange="saveProgress('${item.id}', this.checked ? 'ready' : 'missing')" 
                            class="mt-1 w-5 h-5 rounded border-slate-300 text-indigo-600 focus:ring-indigo-500 cursor-pointer">
                        <div class="max-w-xl">
                            <span class="text-[10px] uppercase font-bold tracking-wider text-slate-400 block mb-0.5">${item.category}</span>
                            <div class="flex items-center gap-2">
                                 <span id="icon-${item.id}">${isReady ? '✅' : isInProgress ? '🔄' : '⚠️'}</span>
                                 <h3 class="font-bold text-sm text-slate-800">${item.name}</h3>
                            </div>
                            <p class="text-xs text-slate-500 mt-0.5 leading-relaxed">${item.desc}</p>
                        </div>
                    </div>
                    <button onclick="saveProgress('${item.id}', '${isInProgress ? 'missing' : 'in_progress'}')" 
                        class="text-[10px] font-bold uppercase tracking-tight px-3 py-1.5 rounded-md border transition ${isInProgress ? 'bg-amber-100 border-amber-300 text-amber-700' : 'bg-slate-50 border-slate-200 text-slate-500 hover:bg-slate-100'}">
                        ${isInProgress ? 'Working on it' : 'Mark In Progress'}
                    </button>
                `;
                container.appendChild(card);
            });

            updateProgressMetrics();
        }

        function updateProgressMetrics() {
            const cards = document.querySelectorAll('[id^="card-"]');
            let readyCount = 0;
            
            cards.forEach(card => {
                const checkbox = card.querySelector('input[type="checkbox"]');
                if (checkbox && checkbox.checked) {
                    readyCount++;
                }
            });

            const pct = Math.round((readyCount / checklistItems.length) * 100);
            document.getElementById('bar-fill').style.width = `${pct}%`;
            document.getElementById('bar-label').innerText = `${pct}% Completed (${readyCount} of ${checklistItems.length} Verified)`;
        }

        async function saveProgress(docId, newStatus) {
            if (!currentStudent) return;

            const statusBadge = document.getElementById('sync-status');
            statusBadge.innerText = "Syncing...";
            statusBadge.className = "inline-flex items-center px-1.5 py-0.5 rounded-sm text-[10px] font-bold bg-amber-50 text-amber-700 tracking-wide uppercase border border-amber-200";
            
            // Build a clean wide column object query package
            const updatePayload = { updated_at: new Date().toISOString() };
            updatePayload[docId] = newStatus;

            const { error } = await _supabase
                .from('student_progress')
                .update(updatePayload)
                .eq('student_name', currentStudent);

            if (error) {
                alert("Cloud sync failed. Check database logs.");
                console.error("Database updates failed:", error);
            } else {
                document.getElementById('sync-status').innerText = "Cloud Sync Active";
                document.getElementById('last-update-time').innerText = `Last sync: ${new Date().toLocaleTimeString()}`;
                statusBadge.className = "inline-flex items-center px-1.5 py-0.5 rounded-sm text-[10px] font-bold bg-emerald-50 text-emerald-700 tracking-wide uppercase border border-emerald-200";
                
                loadStudentProfile(); 
            }
        }

        function switchAccount() {
            document.getElementById('student-name-input').value = "";
            document.getElementById('checklist-workspace').classList.add('hidden');
            document.getElementById('auth-panel').classList.remove('hidden');
        }
    </script>
</head>
<body class="bg-slate-50 min-h-screen py-12 px-4 text-slate-700 antialiased font-sans">

    <div class="max-w-2xl mx-auto space-y-6">
        
        <div id="auth-panel" class="bg-white p-8 rounded-2xl border border-slate-200 shadow-sm text-center max-w-md mx-auto my-12">
            <div class="inline-flex items-center justify-center w-12 h-12 rounded-xl bg-indigo-50 text-indigo-600 font-bold text-xl mb-4">🎓</div>
            <h1 class="text-xl font-extrabold text-slate-900 tracking-tight">VFS Study Visa Tracker</h1>
            <p class="text-xs text-slate-500 mt-2 mb-6 leading-relaxed">Organize your mandatory student visa files for Italy. Type your name below to access your cloud-synchronized portfolio.</p>
            
            <div class="space-y-3">
                <input id="student-name-input" type="text" placeholder="Enter your name (e.g. Sarah Jenkins)" class="border border-slate-300 rounded-xl px-4 py-2.5 text-sm w-full focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition text-center font-medium">
                <button onclick="loadStudentProfile()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold text-sm py-2.5 rounded-xl transition cursor-pointer shadow-xs">Get Started</button>
            </div>
        </div>

        <div id="checklist-workspace" class="hidden space-y-6">
            
            <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-xs flex flex-col md:flex-row md:items-center justify-between gap-4">
                <div class="space-y-1 grow">
                    <div class="flex items-center gap-2">
                        <h2 id="current-user-display" class="font-extrabold text-slate-900 text-lg">Portfolio:</h2>
                        <span id="sync-status" class="inline-flex items-center px-1.5 py-0.5 rounded-sm text-[10px] font-bold bg-emerald-50 text-emerald-700 tracking-wide uppercase border border-emerald-200">Cloud Sync Active</span>
                    </div>
                    <div class="w-full bg-slate-100 rounded-full h-2.5 mt-3">
                        <div id="bar-fill" class="bg-emerald-500 h-2.5 rounded-full transition-all duration-500" style="width: 0%"></div>
                    </div>
                    <div id="bar-label" class="text-xs font-semibold text-slate-500 pt-1 block">0% Completed</div>
                    <div id="last-update-time" class="text-[10px] text-slate-400">Not synced yet</div>
                </div>
                <button onclick="switchAccount()" class="text-xs border border-slate-200 text-slate-500 hover:text-slate-800 hover:bg-slate-50 px-3 py-2 rounded-lg font-medium transition cursor-pointer shrink-0 align-self-start md:align-self-center">Log Out</button>
            </div>

            <div class="space-y-3" id="rows-container"></div>
            
            <footer class="text-center text-[11px] text-slate-400 pt-4">
                VFS Application Assistant App • Secure Serverless Cloud Execution
            </footer>
        </div>

    </div>

</body>
</html>
