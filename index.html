                desc: { en: "Round-trip flight booking or a confirmed itinerary.", fr: "Réservation de vol aller-retour ou itinéraire confirmé.", ar: "حجز طيران ذهاب وإياب أو مسار رحلة مؤكد." }

        // Changes layout alignment and language dictionaries dynamically
        function changeLanguage(langCode) {
            currentLang = langCode;
            
            // Adjust layouts for RTL Right-To-Left alignment for Arabic support
            if (langCode === 'ar') {
                document.documentElement.dir = "rtl";
            } else {
                document.documentElement.dir = "ltr";
            }
            
            // Re-render structural visual layout blocks
            translateStaticUI();
            if (currentStudent) {
                document.getElementById('current-user-display').innerText = `${uiTranslations[currentLang].portfolio}: ${document.getElementById('student-name-input').value.trim()}`;
                renderChecklistUI(globalProgressMap);
            }
        }

        function translateStaticUI() {
            const trans = uiTranslations[currentLang];
            document.getElementById('main-title').innerText = trans.title;
            document.getElementById('main-subtitle').innerText = trans.subtitle;
            document.getElementById('student-name-input').placeholder = trans.placeholder;
            document.getElementById('btn-get-started').innerText = trans.btnGetStarted;
            document.getElementById('btn-logout').innerText = trans.logout;
        }

        async function loadStudentProfile() {
            const nameInput = document.getElementById('student-name-input').value.trim();
            if (!nameInput) {
                alert(currentLang === 'ar' ? "يرجى إدخال اسمك لعرض الملف." : currentLang === 'fr' ? "Veuillez entrer votre nom." : "Please enter your name to view your checklist.");
                return;
            }
            
            currentStudent = nameInput.toLowerCase();
            document.getElementById('current-user-display').innerText = `${uiTranslations[currentLang].portfolio}: ${nameInput}`;
            document.getElementById('sync-status').innerText = uiTranslations[currentLang].syncing;
            
            document.getElementById('auth-panel').classList.add('hidden');
            document.getElementById('checklist-workspace').classList.remove('hidden');

            let { data, error } = await _supabase
                .from('student_progress')
                .select('*')
                .eq('student_name', currentStudent)
                .maybeSingle();

            globalProgressMap = {};
            
            if (data) {
                checklistItems.forEach(item => {
                    globalProgressMap[item.id] = data[item.id] || "missing";
                });
                document.getElementById('sync-status').innerText = uiTranslations[currentLang].loadSuccess;
                if (data.updated_at) {
                    document.getElementById('last-update-time').innerText = `${uiTranslations[currentLang].lastSync}: ${new Date(data.updated_at).toLocaleString()}`;
                }
            } else {
                const initialPayload = { student_name: currentStudent };
                checklistItems.forEach(item => initialPayload[item.id] = 'missing');
                
                await _supabase.from('student_progress').insert([initialPayload]);
                checklistItems.forEach(item => globalProgressMap[item.id] = "missing");
                document.getElementById('sync-status').innerText = uiTranslations[currentLang].newPortfolio;
            }

            renderChecklistUI(globalProgressMap);
        }

        function renderChecklistUI(progressMap) {
            const container = document.getElementById('rows-container');
            container.innerHTML = "";
            
            checklistItems.forEach(item => {
                const savedStatus = progressMap[item.id] || "missing";
                let cardColor = "bg-white border-slate-200";
                
                if(savedStatus === 'ready') cardColor = "bg-emerald-50/40 border-emerald-200";
                else if(savedStatus === 'in_progress') cardColor = "bg-amber-50/40 border-amber-200";

                const card = document.createElement('div');
                card.id = `card-${item.id}`;
                card.className = `p-5 flex flex-col sm:flex-row sm:items-center justify-between gap-4 border rounded-xl transition shadow-xs ${cardColor}`;
                
                const isReady = savedStatus === 'ready';
                const isInProgress = savedStatus === 'in_progress';

                // Grab translations dynamically depending on currentLang choice
                const categoryText = item.category[currentLang] || item.category['en'];
                const nameText = item.name[currentLang] || item.name['en'];
                const descText = item.desc[currentLang] || item.desc['en'];
                const buttonText = isInProgress ? uiTranslations[currentLang].workingOnIt : uiTranslations[currentLang].markProgress;

                card.innerHTML = `
                    <div class="flex items-start gap-4 grow">
                        <input type="checkbox" ${isReady ? 'checked' : ''} 
                            onchange="saveProgress('${item.id}', this.checked ? 'ready' : 'missing')" 
                            class="mt-1 w-5 h-5 rounded border-slate-300 text-indigo-600 focus:ring-indigo-500 cursor-pointer">
                        <div class="max-w-xl">
                            <span class="text-[10px] uppercase font-bold tracking-wider text-slate-400 block mb-0.5">${categoryText}</span>
                            <div class="flex items-center gap-2">
                                 <span>${isReady ? '✅' : isInProgress ? '🔄' : '⚠️'}</span>
                                 <h3 class="font-bold text-sm text-slate-800">${nameText}</h3>
                            </div>
                            <p class="text-xs text-slate-500 mt-0.5 leading-relaxed">${descText}</p>
                        </div>
                    </div>
                    <button onclick="saveProgress('${item.id}', '${isInProgress ? 'missing' : 'in_progress'}')" 
                        class="text-[10px] font-bold uppercase tracking-tight px-3 py-1.5 rounded-md border transition ${isInProgress ? 'bg-amber-100 border-amber-300 text-amber-700' : 'bg-slate-50 border-slate-200 text-slate-500 hover:bg-slate-100'}">
                        ${buttonText}
                    </button>
                `;
                container.appendChild(card);
            });

            updateProgressMetrics();
        }

        function updateProgressMetrics() {
            const cards = document.querySelectorAll('[id^="card-"]');
            let readyCount = 0;
            
            cards.forEach(card => {
                const checkbox = card.querySelector('input[type="checkbox"]');
                if (checkbox && checkbox.checked) readyCount++;
            });

            const pct = Math.round((readyCount / checklistItems.length) * 100);
            document.getElementById('bar-fill').style.width = `${pct}%`;
            
            const labelTemplate = currentLang === 'ar' 
                ? `${pct}% ${uiTranslations['ar'].completed} (${readyCount} من ${checklistItems.length} ${uiTranslations['ar'].verified})`
                : `${pct}% ${uiTranslations[currentLang].completed} (${readyCount} de ${checklistItems.length} ${uiTranslations[currentLang].verified})`;
                
            document.getElementById('bar-label').innerText = labelTemplate;
        }

        async function saveProgress(docId, newStatus) {
            if (!currentStudent) return;

            const statusBadge = document.getElementById('sync-status');
            statusBadge.innerText = uiTranslations[currentLang].syncing;
            statusBadge.className = "inline-flex items-center px-1.5 py-0.5 rounded-sm text-[10px] font-bold bg-amber-50 text-amber-700 tracking-wide uppercase border border-amber-200";
            
            const updatePayload = { updated_at: new Date().toISOString() };
            updatePayload[docId] = newStatus;

            const { error } = await _supabase
                .from('student_progress')
                .update(updatePayload)
                .eq('student_name', currentStudent);

            if (error) {
                console.error("Database updates failed:", error);
            } else {
                document.getElementById('sync-status').innerText = uiTranslations[currentLang].syncActive;
                document.getElementById('last-update-time').innerText = `${uiTranslations[currentLang].lastSync}: ${new Date().toLocaleTimeString()}`;
                statusBadge.className = "inline-flex items-center px-1.5 py-0.5 rounded-sm text-[10px] font-bold bg-emerald-50 text-emerald-700 tracking-wide uppercase border border-emerald-200";
                
                globalProgressMap[docId] = newStatus; 
                renderChecklistUI(globalProgressMap);
            }
        }

        function switchAccount() {
            document.getElementById('student-name-input').value = "";
            document.getElementById('checklist-workspace').classList.add('hidden');
            document.getElementById('auth-panel').classList.remove('hidden');
        }
    </script>

            <button onclick="changeLanguage('ar')" class="px-2.5 py-1 bg-white border border-slate-200 rounded-md hover:bg-slate-100 transition">العربية</button>
        </div>
        
        <div id="auth-panel" class="bg-white p-8 rounded-2xl border border-slate-200 shadow-sm text-center max-w-md mx-auto my-12">
            <div class="inline-flex items-center justify-center w-12 h-12 rounded-xl bg-indigo-50 text-indigo-600 font-bold text-xl mb-4">🎓</div>
            <h1 id="main-title" class="text-xl font-extrabold text-slate-900 tracking-tight">VFS Study Visa Tracker</h1>
            <p id="main-subtitle" class="text-xs text-slate-500 mt-2 mb-6 leading-relaxed">Organize your mandatory student visa files for Italy. Type your name below to access your cloud-synchronized portfolio.</p>
            
            <div class="space-y-3">
                <input id="student-name-input" type="text" placeholder="Enter your name (e.g. Sarah Jenkins)" class="border border-slate-300 rounded-xl px-4 py-2.5 text-sm w-full focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition text-center font-medium">
                <button id="btn-get-started" onclick="loadStudentProfile()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold text-sm py-2.5 rounded-xl transition cursor-pointer shadow-xs">Get Started</button>
            </div>
        </div>

        <div id="checklist-workspace" class="hidden space-y-6">
            
            <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-xs flex flex-col md:flex-row md:items-center justify-between gap-4">
                <div class="space-y-1 grow">
                    <div class="flex items-center gap-2">
                        <h2 id="current-user-display" class="font-extrabold text-slate-900 text-lg">Portfolio:</h2>
                        <span id="sync-status" class="inline-flex items-center px-1.5 py-0.5 rounded-sm text-[10px] font-bold bg-emerald-50 text-emerald-700 tracking-wide uppercase border border-emerald-200">Cloud Sync Active</span>
                    </div>
                    <div class="w-full bg-slate-100 rounded-full h-2.5 mt-3">
                        <div id="bar-fill" class="bg-emerald-500 h-2.5 rounded-full transition-all duration-500" style="width: 0%"></div>
                    </div>
                    <div id="bar-label" class="text-xs font-semibold text-slate-500 pt-1 block">0% Completed</div>
                    <div id="last-update-time" class="text-[10px] text-slate-400">Not synced yet</div>
                </div>
                <button id="btn-logout" onclick="switchAccount()" class="text-xs border border-slate-200 text-slate-500 hover:text-slate-800 hover:bg-slate-50 px-3 py-2 rounded-lg font-medium transition cursor-pointer shrink-0 align-self-start md:align-self-center">Log Out</button>
            </div>

            <div class="space-y-3" id="rows-container"></div>
            
            <footer class="text-center text-[11px] text-slate-400 pt-4">
                VFS Application Assistant App • Secure Serverless Cloud Execution
            </footer>
        </div>

    </div>

</body>
